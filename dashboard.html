<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="quiz-api-base" content="" />
<title>মক টেস্ট ড্যাশবোর্ড</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#f5f7fb;
    --surface:#ffffff;
    --ink:#17202a;
    --muted:#627084;
    --line:#d9e0ea;
    --primary:#0f766e;
    --accent:#2563eb;
    --success:#16834a;
    --gold:#c99722;
    --silver:#8996a8;
    --bronze:#b87345;
    --shadow:0 16px 38px rgba(23,32,42,.12);
    --radius:8px;
    --font:'Noto Sans Bengali', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  *{box-sizing:border-box}
  html,body{min-height:100%}
  body{
    margin:0;
    background:
      linear-gradient(135deg, rgba(15,118,110,.08), transparent 34%),
      linear-gradient(315deg, rgba(37,99,235,.08), transparent 32%),
      var(--bg);
    color:var(--ink);
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
  }
  .app{width:min(100%,900px); margin:0 auto; padding:18px 14px 48px}
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
  }
  .brand small{
    display:block;
    color:var(--primary);
    font-size:12px;
    font-weight:800;
    letter-spacing:.04em;
    text-transform:uppercase;
  }
  .brand h1{margin:3px 0 0; font-size:25px; line-height:1.25}
  .nav-link{
    flex:0 0 auto;
    text-decoration:none;
    color:#fff;
    background:var(--primary);
    border-radius:var(--radius);
    padding:10px 13px;
    font-weight:800;
  }
  .surface{
    background:rgba(255,255,255,.94);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .summary{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:1px;
    background:var(--line);
  }
  .metric{
    background:#fff;
    padding:16px;
  }
  .metric b{
    display:block;
    color:var(--muted);
    font-size:12px;
    margin-bottom:4px;
  }
  .metric span{
    display:block;
    font-size:23px;
    font-weight:800;
  }
  .list{padding:8px}
  .row{
    display:grid;
    grid-template-columns:48px 42px minmax(0,1fr) auto;
    gap:12px;
    align-items:center;
    padding:12px 10px;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:0}
  .rank{
    width:38px;
    height:38px;
    border-radius:50%;
    display:grid;
    place-items:center;
    border:1px solid var(--line);
    color:var(--muted);
    font-weight:800;
    background:#fff;
  }
  .rank.top1{background:var(--gold); border-color:var(--gold); color:#2f2305}
  .rank.top2{background:var(--silver); border-color:var(--silver); color:#17202a}
  .rank.top3{background:var(--bronze); border-color:var(--bronze); color:#fff}
  .avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    display:grid;
    place-items:center;
    background:#e8f5f2;
    color:var(--primary);
    font-weight:800;
    border:1px solid #c6e6df;
  }
  .who{min-width:0}
  .name{
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .meta{
    color:var(--muted);
    font-size:13px;
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .score{text-align:right}
  .score strong{display:block; font-size:18px}
  .score span{display:block; color:var(--muted); font-size:13px}
  .state{
    padding:42px 18px;
    text-align:center;
    color:var(--muted);
    line-height:1.65;
  }
  .loader{
    width:38px;
    height:38px;
    border-radius:50%;
    border:4px solid var(--line);
    border-top-color:var(--primary);
    margin:0 auto 12px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .num{font-variant-numeric:tabular-nums}
  @media (max-width:640px){
    .app{padding:14px 10px 36px}
    .topbar{align-items:flex-start}
    .brand h1{font-size:21px}
    .summary{grid-template-columns:1fr}
    .row{grid-template-columns:40px 38px minmax(0,1fr); gap:9px}
    .score{grid-column:3; text-align:left}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important; transition:none!important}
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <small>লাইভ স্কোরবোর্ড</small>
      <h1 id="board-title">মক টেস্ট ড্যাশবোর্ড</h1>
    </div>
    <a class="nav-link" href="index.html">কুইজে ফিরুন</a>
  </header>

  <section class="surface">
    <div class="summary">
      <div class="metric"><b>শিক্ষার্থী</b><span class="num" id="m-students">০</span></div>
      <div class="metric"><b>মোট উত্তর</b><span class="num" id="m-attempts">০</span></div>
      <div class="metric"><b>সেরা স্কোর</b><span class="num" id="m-best">০</span></div>
    </div>

    <div id="state-loading" class="state">
      <div class="loader"></div>
      ড্যাশবোর্ড লোড হচ্ছে...
    </div>
    <div id="state-empty" class="state hidden">
      এখনও কেউ কুইজ শেষ করেনি। প্রথম ফলাফল জমা হলেই তালিকা দেখা যাবে।
    </div>
    <div id="state-error" class="state hidden">
      স্কোরবোর্ড সাময়িকভাবে দেখা যাচ্ছে না। একটু পরে আবার চেষ্টা করুন।
    </div>
    <div id="list" class="list hidden"></div>
  </section>
</main>

<script>
(function(){
  "use strict";

  var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) {
    try {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("#f5f7fb"); tg.setBackgroundColor("#f5f7fb"); } catch(e){}
    } catch(e){}
  }

  var API_BASE = (window.QUIZ_API_BASE || document.querySelector('meta[name="quiz-api-base"]').content || "").replace(/\/$/, "");
  var BN = ["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
  var quizId = new URLSearchParams(window.location.search).get("quiz") || "";
  function byId(id){ return document.getElementById(id); }
  function bn(value){ return String(value).replace(/[0-9]/g, function(d){ return BN[+d]; }); }
  function api(path){ return API_BASE + path; }

  load();
  setInterval(load, 30000);

  function setState(name){
    ["loading","empty","error"].forEach(function(state){
      byId("state-" + state).classList.toggle("hidden", state !== name);
    });
    byId("list").classList.toggle("hidden", name !== "ok");
  }

  function load(){
    var path = quizId ? "/api/quiz/" + encodeURIComponent(quizId) + "/leaderboard?limit=20" : "/api/leaderboard?limit=20";
    if (quizId) byId("board-title").textContent = "এই কুইজের Leaderboard";
    fetch(api(path))
      .then(function(resp){
        if (!resp.ok) throw new Error("Leaderboard API returned " + resp.status);
        return resp.json();
      })
      .then(function(data){
        if (data.unavailable) {
          setMetrics(0, 0, 0);
          setState("error");
          return;
        }
        render(data.rows || []);
      })
      .catch(function(err){
        console.error(err);
        setMetrics(0, 0, 0);
        setState("error");
      });
  }

  function render(rows){
    var totalAttempts = rows.reduce(function(sum,row){ return sum + (quizId ? (row.answered || 0) : (row.total_attempts || 0)); }, 0);
    var best = rows.length ? (quizId ? rows[0].score : rows[0].correct_attempts) || 0 : 0;
    setMetrics(rows.length, totalAttempts, best);

    if (!rows.length) {
      setState("empty");
      return;
    }

    var list = byId("list");
    list.innerHTML = "";
    rows.forEach(function(row, index){
      var rank = row.rank || index + 1;
      var name = displayName(row);
      var score = quizId ? row.score : row.correct_attempts;
      var total = quizId ? row.total : row.total_attempts;
      var accuracy = total ? Math.round((score / total) * 100) : 0;
      var item = document.createElement("article");
      item.className = "row";
      item.innerHTML =
        '<div class="rank"></div>' +
        '<div class="avatar"></div>' +
        '<div class="who"><div class="name"></div><div class="meta num"></div></div>' +
        '<div class="score num"><strong></strong><span></span></div>';
      var rankEl = item.querySelector(".rank");
      rankEl.className = "rank" + (rank <= 3 ? " top" + rank : "");
      rankEl.textContent = bn(rank);
      item.querySelector(".avatar").textContent = initial(name);
      item.querySelector(".name").textContent = name;
      item.querySelector(".meta").textContent = quizId ? bn(row.answered || 0) + "/১০টি উত্তর" : bn(row.total_attempts || 0) + "টি উত্তর জমা";
      item.querySelector(".score strong").textContent = bn(score || 0);
      item.querySelector(".score span").textContent = bn(accuracy) + "% সঠিক";
      list.appendChild(item);
    });
    setState("ok");
  }

  function setMetrics(students, attempts, best){
    byId("m-students").textContent = bn(students);
    byId("m-attempts").textContent = bn(attempts);
    byId("m-best").textContent = bn(best);
  }

  function displayName(row){
    if (row.display_name) return row.display_name;
    var full = [row.first_name, row.last_name].filter(Boolean).join(" ").trim();
    if (full) return full;
    if (row.username) return "@" + row.username;
    if (row.telegram_id) return "শিক্ষার্থী " + row.telegram_id;
    return "শিক্ষার্থী";
  }

  function initial(name){
    var trimmed = (name || "?").trim();
    return trimmed ? trimmed[0].toUpperCase() : "?";
  }
})();
</script>
</body>
</html>
