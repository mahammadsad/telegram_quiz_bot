[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
warn_unused_ignores = true
files = ["app.py", "bot.py", "config", "database", "errors.py", "models", "services", "storage", "telegram", "utils"]
exclude = [".venv", "quizzes"]
