services:
  - type: web
    name: telegram-quiz-platform
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install --disable-pip-version-check -r requirements.lock
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: EXPECTED_SUPABASE_PROJECT_REF
        value: tizxodkcpglmxgtwepor
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_FORUM_TOPICS_JSON
        sync: false
      - key: TELEGRAM_GENERAL_THREAD_ID
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: MINIAPP_SHORT_NAME
        sync: false
      - key: GEMINI_API_KEY_PRIMARY
        sync: false
      - key: GEMINI_API_KEY_SECONDARY
        sync: false
      - key: GEMINI_MODEL_PRIMARY
        value: gemini-2.5-flash-lite
      - key: GEMINI_MODEL_FALLBACK
        value: gemini-2.5-flash
      - key: GEMINI_FAILOVER_ENABLED
        value: "true"
      - key: QUESTION_VERIFICATION_MIN_CONFIDENCE
        value: "0.85"
      - key: QUESTION_REPORT_THRESHOLD
        value: "3"
      - key: TELEGRAM_INIT_DATA_MAX_AGE_SECONDS
        value: "86400"
      - key: TELEGRAM_WRITE_INIT_DATA_MAX_AGE_SECONDS
        value: "3600"
      - key: DEV_ALLOW_UNVERIFIED_TELEGRAM
        value: "false"
      - key: WRITE_STATIC_QUIZ_JSON
        value: "false"
