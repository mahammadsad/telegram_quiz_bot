name: Staging Quiz Smoke

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Safe staging operation
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - subject-quiz
      subject:
        description: One enabled, source-covered subject
        required: true
        default: history
        type: choice
        options:
          - computer
          - bengali
          - reasoning
          - mathematics
          - english
          - miscellaneous
          - polity
          - geography
          - science
          - economics
          - history
          - environment
          - current-affairs
      verify_status:
        description: Read sanitized staging health after the operation
        required: false
        default: true
        type: boolean
      force_post:
        description: Repost an existing certified pack (normally disabled)
        required: false
        default: false
        type: boolean
      force_regenerate:
        description: Replace one selected staging pack (normally disabled)
        required: false
        default: false
        type: boolean
      safety_ack:
        description: Required only for a force option; enter the documented staging phrase
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: staging-quiz-smoke
  cancel-in-progress: false

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      APP_TIMEZONE: Asia/Kolkata
      EXPECTED_SUPABASE_PROJECT_REF: prdrabmcivgbygzjnmko
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_FORUM_TOPICS_JSON: ${{ secrets.TELEGRAM_FORUM_TOPICS_JSON }}
      TELEGRAM_GENERAL_THREAD_ID: ${{ secrets.TELEGRAM_GENERAL_THREAD_ID }}
      TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
      MINIAPP_SHORT_NAME: ${{ vars.MINIAPP_SHORT_NAME }}
      GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
      GEMINI_API_KEY_SECONDARY: ${{ secrets.GEMINI_API_KEY_SECONDARY }}
      GEMINI_MODEL_PRIMARY: gemini-2.5-flash-lite
      GEMINI_MODEL_FALLBACK: gemini-2.5-flash
      GEMINI_FAILOVER_ENABLED: "true"
      DEV_ALLOW_UNVERIFIED_TELEGRAM: "false"
      WRITE_STATIC_QUIZ_JSON: "false"
      RENDER_STAGING_URL: https://telegram-quiz-bot-staging.onrender.com
      INPUT_OPERATION: ${{ inputs.operation }}
      INPUT_SUBJECT: ${{ inputs.subject }}
      INPUT_FORCE_POST: ${{ inputs.force_post }}
      INPUT_FORCE_REGENERATE: ${{ inputs.force_regenerate }}
      INPUT_SAFETY_ACK: ${{ inputs.safety_ack }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Fail-closed staging identity and operation gate
        id: gate
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from urllib.parse import urlparse

          from config.subjects import get_subject

          expected_ref = "prdrabmcivgbygzjnmko"
          expected_host = f"{expected_ref}.supabase.co"
          if os.environ.get("EXPECTED_SUPABASE_PROJECT_REF") != expected_ref:
              raise SystemExit("Refusing operation: expected staging project ref is not exact.")
          if urlparse(os.environ.get("SUPABASE_URL", "")).hostname != expected_host:
              raise SystemExit("Refusing operation: Supabase URL is not the staging project.")
          if os.environ.get("DEV_ALLOW_UNVERIFIED_TELEGRAM") != "false":
              raise SystemExit("Refusing operation: unverified Telegram users must remain disabled.")
          if os.environ.get("WRITE_STATIC_QUIZ_JSON") != "false":
              raise SystemExit("Refusing operation: staging must never write public fallbacks.")
          if os.environ.get("APP_TIMEZONE") != "Asia/Kolkata":
              raise SystemExit("Refusing operation: staging timezone mismatch.")

          required = (
              "SUPABASE_URL",
              "SUPABASE_SERVICE_KEY",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_CHAT_ID",
              "TELEGRAM_FORUM_TOPICS_JSON",
              "TELEGRAM_GENERAL_THREAD_ID",
              "TELEGRAM_BOT_USERNAME",
              "MINIAPP_SHORT_NAME",
          )
          if [name for name in required if not os.environ.get(name)]:
              raise SystemExit("Refusing operation: required staging configuration is incomplete.")
          if not (
              os.environ.get("GEMINI_API_KEY_PRIMARY")
              or os.environ.get("GEMINI_API_KEY_SECONDARY")
          ):
              raise SystemExit("Refusing operation: no staging Gemini credential is configured.")

          operation = os.environ.get("INPUT_OPERATION", "")
          subject = os.environ.get("INPUT_SUBJECT", "")
          if operation not in {"preflight", "subject-quiz"}:
              raise SystemExit("Refusing operation: unsupported staging mode.")
          get_subject(subject, require_quiz_enabled=True)

          force_post = os.environ.get("INPUT_FORCE_POST", "false").lower() == "true"
          force_regenerate = (
              os.environ.get("INPUT_FORCE_REGENERATE", "false").lower() == "true"
          )
          if force_post and force_regenerate:
              raise SystemExit("Refusing operation: force flags are mutually exclusive.")
          if (force_post or force_regenerate) and operation != "subject-quiz":
              raise SystemExit("Refusing operation: force flags require one subject quiz.")
          expected_ack = f"ALLOW FORCE ON STAGING {expected_ref}"
          if (force_post or force_regenerate) and os.environ.get("INPUT_SAFETY_ACK") != expected_ack:
              raise SystemExit("Refusing operation: staging force acknowledgement is not exact.")

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"operation={operation}\n")
              handle.write(f"subject={subject}\n")
              handle.write(f"force_post={str(force_post).lower()}\n")
              handle.write(f"force_regenerate={str(force_regenerate).lower()}\n")
          print("Staging identity, configuration presence, and operation gate passed.")
          PY

      - name: Install locked dependencies
        run: pip install --disable-pip-version-check -r requirements.lock

      - name: Sanitized staging preflight
        run: python bot.py --mode preflight

      - name: Generate and post exactly one selected subject quiz
        if: steps.gate.outputs.operation == 'subject-quiz'
        shell: bash
        run: |
          args=(--mode subject-quiz --subject "${{ steps.gate.outputs.subject }}")
          if [ "${{ steps.gate.outputs.force_post }}" = "true" ]; then
            args+=(--force-post)
          fi
          if [ "${{ steps.gate.outputs.force_regenerate }}" = "true" ]; then
            args+=(--force-regenerate)
          fi
          python bot.py "${args[@]}"

      - name: Read sanitized staging health
        if: ${{ inputs.verify_status }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.request import urlopen

          base = os.environ["RENDER_STAGING_URL"].rstrip("/")
          for path in ("/health/live", "/health/ready"):
              with urlopen(base + path, timeout=30) as response:
                  body = json.load(response)
                  print(
                      json.dumps(
                          {
                              "path": path,
                              "status": response.status,
                              "applicationVersion": body.get("applicationVersion"),
                              "databaseContractVersion": body.get("databaseContractVersion"),
                              "requiredMigrationVersion": body.get("requiredMigrationVersion"),
                              "ready": body.get("ready"),
                          },
                          sort_keys=True,
                      )
                  )
          PY
