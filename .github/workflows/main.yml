name: Subject Quiz Scheduler

permissions:
  contents: write

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 2 * * *"
    - cron: "30 3 * * *"
    - cron: "30 4 * * *"
    - cron: "30 5 * * *"
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"
    - cron: "30 10 * * *"
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"
    - cron: "30 13 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Job mode
        required: true
        default: subject-quiz
        type: choice
        options: [preflight, subject-quiz, recover-missed-quizzes, announce]
      subject:
        description: Canonical subject key (required for subject-quiz)
        required: false
        type: string
      force_post:
        description: Repost saved validated content without Gemini
        required: false
        default: false
        type: boolean
      force_regenerate:
        description: Explicitly replace generated content
        required: false
        default: false
        type: boolean

jobs:
  resolve_job:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.job.outputs.mode }}
      subject: ${{ steps.job.outputs.subject }}
      force_post: ${{ steps.job.outputs.force_post }}
      force_regenerate: ${{ steps.job.outputs.force_regenerate }}
      concurrency_key: ${{ steps.job.outputs.concurrency_key }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve canonical schedule mapping
        id: job
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_SUBJECT: ${{ inputs.subject }}
          FORCE_POST: ${{ inputs.force_post }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from config.schedule import scheduled_action
          from config.subjects import get_subject

          if os.environ["EVENT_NAME"] == "workflow_dispatch":
              mode = os.environ.get("INPUT_MODE") or "subject-quiz"
              subject = (os.environ.get("INPUT_SUBJECT") or "").strip()
          else:
              mode, subject = scheduled_action(os.environ["EVENT_SCHEDULE"])
              subject = subject or ""

          force_post = os.environ.get("FORCE_POST", "false").lower() == "true"
          force_regenerate = os.environ.get("FORCE_REGENERATE", "false").lower() == "true"
          if mode == "subject-quiz":
              if not subject:
                  raise SystemExit("subject is required")
              get_subject(subject, require_quiz_enabled=True)
          elif force_post or force_regenerate:
              raise SystemExit("force flags apply only to subject-quiz")
          if force_post and force_regenerate:
              raise SystemExit("force flags are mutually exclusive")

          target_date = datetime.now(ZoneInfo("Asia/Kolkata")).strftime("%Y%m%d")
          logical_target = subject or mode
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"mode={mode}\n")
              handle.write(f"subject={subject}\n")
              handle.write(f"force_post={str(force_post).lower()}\n")
              handle.write(f"force_regenerate={str(force_regenerate).lower()}\n")
              handle.write(f"concurrency_key={target_date}-{logical_target}\n")
          PY

  run-bot:
    needs: resolve_job
    runs-on: ubuntu-latest
    concurrency:
      group: subject-quiz-${{ needs.resolve_job.outputs.concurrency_key }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.lock

      - name: Sanitized configuration preflight
        env: &bot-env
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY_SECONDARY: ${{ secrets.GEMINI_API_KEY_SECONDARY }}
          GEMINI_MODEL_PRIMARY: gemini-2.5-flash-lite
          GEMINI_MODEL_FALLBACK: gemini-2.5-flash
          GEMINI_FAILOVER_ENABLED: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_FORUM_TOPICS_JSON: ${{ secrets.TELEGRAM_FORUM_TOPICS_JSON }}
          TELEGRAM_GENERAL_THREAD_ID: ${{ secrets.TELEGRAM_GENERAL_THREAD_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_ADMIN_USER_IDS: ${{ secrets.TELEGRAM_ADMIN_USER_IDS }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          MINIAPP_SHORT_NAME: ${{ vars.MINIAPP_SHORT_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python bot.py --mode preflight

      - name: Run exactly one mapped job
        env: *bot-env
        run: |
          args=(--mode "${{ needs.resolve_job.outputs.mode }}")
          if [ -n "${{ needs.resolve_job.outputs.subject }}" ]; then args+=(--subject "${{ needs.resolve_job.outputs.subject }}"); fi
          if [ "${{ needs.resolve_job.outputs.force_post }}" = "true" ]; then args+=(--force-post); fi
          if [ "${{ needs.resolve_job.outputs.force_regenerate }}" = "true" ]; then args+=(--force-regenerate); fi
          python bot.py "${args[@]}"

      - name: Commit only new public fallback files
        if: needs.resolve_job.outputs.mode == 'subject-quiz' || needs.resolve_job.outputs.mode == 'recover-missed-quizzes'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- 'quizzes/????????-*.json'
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add public subject quiz fallback"
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push && exit 0
          done
          exit 1
