name: WB Exam Quiz Pack Bot Scheduler

on:
  schedule:
    - cron: "30 14 * * 0"   # Sunday   20:00 IST → syllabus announcement
    - cron: "0 13 * * 1-6"  # Mon–Sat  18:30 IST → daily quiz
  workflow_dispatch:
    inputs:
      mode:
        description: "Which job to run"
        required: true
        default: "quiz"
        type: choice
        options:
          - announce
          - quiz

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide which mode to run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 14 * * 0" ]; then
            echo "mode=announce" >> "$GITHUB_OUTPUT"
          else
            echo "mode=quiz" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          MINIAPP_SHORT_NAME: ${{ vars.MINIAPP_SHORT_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python bot.py --mode ${{ steps.decide.outputs.mode }}
