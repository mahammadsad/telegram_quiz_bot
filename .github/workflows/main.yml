# WB Exam Quiz Bot Scheduler
#
# NOTE: this file was reconstructed from DEPLOYMENT_GUIDE.md's description of
# the original workflow (that file itself wasn't shared when this update was
# made) — since we removed the QUIZ_PAGE_URL / GitHub-Pages-URL computation
# step entirely (the new Mini App flow doesn't need it: index.html fetches
# quizzes/<id>.json as a plain relative path, and the button links to a
# t.me/... Mini App URL instead). If your real workflow had other custom
# steps, merge them back in — everything else here matches the guide.

name: WB Exam Quiz Bot Scheduler

on:
  schedule:
    - cron: "30 14 * * 0"   # Sunday   20:00 IST → syllabus announcement
    - cron: "0 13 * * 1-6"  # Mon–Sat  18:30 IST → daily quiz
  workflow_dispatch:
    inputs:
      mode:
        description: "Which job to run"
        required: true
        default: "quiz"
        type: choice
        options:
          - announce
          - quiz

# Needed so the last step below can push syllabus_state.json / quizzes/*.json
# back to the repo. Also set in Settings → Actions → General → Workflow
# permissions → "Read and write permissions" (belt-and-braces; some org
# policies only honor the repo setting, others only honor this).
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide which mode to run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 14 * * 0" ]; then
            echo "mode=announce" >> "$GITHUB_OUTPUT"
          else
            echo "mode=quiz" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          MINIAPP_SHORT_NAME: ${{ vars.MINIAPP_SHORT_NAME }}
        run: python bot.py --mode ${{ steps.decide.outputs.mode }}

      - name: Commit generated quiz + syllabus files
        run: |
          git config user.name "wb-quiz-bot"
          git config user.email "actions@users.noreply.github.com"
          git add syllabus_state.json quizzes/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: update syllabus state + today's quiz [skip ci]"
            git push
          fi
