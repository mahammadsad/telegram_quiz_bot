name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.lock
      - run: ruff check .
      - run: mypy
      - run: pytest -q
      - name: Validate Computer Education expansion sources
        run: python scripts/import_source_documents.py sources/computer_education_expansion_v2.json --validate-only
      - run: python scripts/check_public_data.py
      - name: Migration security contract
        run: pytest -q tests/test_atomic_integrity_contracts.py
