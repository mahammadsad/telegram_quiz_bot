name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/telegram_quiz_test
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: telegram_quiz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d telegram_quiz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.lock
      - run: ruff check .
      - run: mypy
      - name: Build disposable database and apply every migration
        run: python scripts/apply_test_database.py
      - run: pytest -q
      - name: Validate gated expansion source bundles
        run: |
          for bundle in sources/*_expansion_v2.json; do
            python scripts/import_source_documents.py "$bundle" --validate-only
          done
      - run: python scripts/check_public_data.py --history
      - name: Migration security contract
        run: pytest -q tests/test_atomic_integrity_contracts.py

  mobile-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
      - name: Install browser-test dependencies
        run: npm ci
      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium
      - name: Run real mobile browser tests
        run: npm run test:browser
      - name: Upload browser report, screenshots, traces, and videos
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobile-browser-evidence-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: error
          retention-days: 30
